<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>MicroGoal</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: #0A0E1A;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Rajdhani', sans-serif;
    overflow: hidden;
    position: relative;
  }

  /* Animated background grid */
  .bg-grid {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background-image:
      linear-gradient(rgba(0,229,204,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,204,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: gridMove 20s linear infinite;
    z-index: 0;
  }

  @keyframes gridMove {
    0% { background-position: 0 0; }
    100% { background-position: 40px 40px; }
  }

  /* Glowing orb behind logo */
  .glow-orb {
    position: fixed;
    width: 300px;
    height: 300px;
    background: radial-gradient(circle, rgba(0,229,204,0.12) 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -60%);
    z-index: 0;
    animation: pulse 4s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.6; transform: translate(-50%, -60%) scale(1); }
    50% { opacity: 1; transform: translate(-50%, -60%) scale(1.15); }
  }

  .container {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    padding: 40px 30px;
    gap: 0;
  }

  /* Icon */
  .icon-wrapper {
    width: 100px;
    height: 100px;
    border-radius: 28px;
    background: linear-gradient(135deg, #0A0E1A, #141a2e);
    border: 1.5px solid rgba(0,229,204,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 28px;
    box-shadow: 0 0 30px rgba(0,229,204,0.2), inset 0 0 20px rgba(0,229,204,0.05);
    animation: iconFloat 3s ease-in-out infinite;
  }

  @keyframes iconFloat {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-8px); }
  }

  .icon-wrapper svg {
    width: 52px;
    height: 52px;
    filter: drop-shadow(0 0 8px rgba(0,229,204,0.8));
  }

  /* Title */
  .title {
    font-family: 'Orbitron', sans-serif;
    font-size: 32px;
    font-weight: 900;
    color: #FFFFFF;
    letter-spacing: 2px;
    text-align: center;
    margin-bottom: 6px;
    animation: fadeUp 0.8s ease forwards;
  }

  .title span {
    color: #00E5CC;
    text-shadow: 0 0 20px rgba(0,229,204,0.7);
  }

  /* Tagline */
  .tagline {
    font-size: 14px;
    color: rgba(255,255,255,0.45);
    letter-spacing: 3px;
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 50px;
    animation: fadeUp 1s ease forwards;
  }

  /* Feature pills */
  .features {
    display: flex;
    flex-direction: column;
    gap: 14px;
    width: 100%;
    max-width: 320px;
    margin-bottom: 50px;
    animation: fadeUp 1.2s ease forwards;
  }

  .feature-pill {
    display: flex;
    align-items: center;
    gap: 14px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(0,229,204,0.15);
    border-radius: 14px;
    padding: 14px 18px;
  }

  .pill-icon {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: rgba(0,229,204,0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .pill-text strong {
    display: block;
    color: #FFFFFF;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  .pill-text span {
    color: rgba(255,255,255,0.4);
    font-size: 12px;
  }

  /* CTA Button */
  .cta-btn {
    width: 100%;
    max-width: 320px;
    padding: 18px;
    border-radius: 16px;
    border: none;
    background: linear-gradient(135deg, #00E5CC, #00B4A0);
    color: #0A0E1A;
    font-family: 'Orbitron', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 2px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    box-shadow: 0 0 30px rgba(0,229,204,0.4), 0 8px 24px rgba(0,0,0,0.3);
    animation: fadeUp 1.4s ease forwards;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }

  .cta-btn::before {
    content: '';
    position: absolute;
    top: -50%; left: -60%;
    width: 40%; height: 200%;
    background: rgba(255,255,255,0.25);
    transform: skewX(-20deg);
    animation: shimmer 3s infinite;
  }

  @keyframes shimmer {
    0% { left: -60%; }
    100% { left: 160%; }
  }

  .cta-btn:active {
    transform: scale(0.97);
    box-shadow: 0 0 15px rgba(0,229,204,0.3);
  }

  /* Subtitle under button */
  .sub-note {
    margin-top: 16px;
    font-size: 12px;
    color: rgba(255,255,255,0.25);
    letter-spacing: 1px;
    text-align: center;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Particles */
  .particle {
    position: fixed;
    width: 2px;
    height: 2px;
    background: #00E5CC;
    border-radius: 50%;
    animation: float linear infinite;
    opacity: 0;
  }

  @keyframes float {
    0% { transform: translateY(100vh) scale(0); opacity: 0; }
    10% { opacity: 0.6; }
    90% { opacity: 0.3; }
    100% { transform: translateY(-10vh) scale(1); opacity: 0; }
  }
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="glow-orb"></div>

<!-- Floating particles -->
<div class="particle" style="left:10%; animation-duration:8s; animation-delay:0s;"></div>
<div class="particle" style="left:25%; animation-duration:12s; animation-delay:2s; width:3px; height:3px;"></div>
<div class="particle" style="left:50%; animation-duration:9s; animation-delay:1s;"></div>
<div class="particle" style="left:70%; animation-duration:11s; animation-delay:3s;"></div>
<div class="particle" style="left:85%; animation-duration:7s; animation-delay:0.5s; width:3px; height:3px;"></div>
<div class="particle" style="left:40%; animation-duration:10s; animation-delay:4s;"></div>

<div class="container">

  <!-- App Icon -->
  <div class="icon-wrapper">
    <svg viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="26" cy="26" r="20" stroke="#00E5CC" stroke-width="2" opacity="0.3"/>
      <circle cx="26" cy="26" r="13" stroke="#00E5CC" stroke-width="2.5"/>
      <circle cx="26" cy="26" r="4" fill="#00E5CC"/>
      <line x1="26" y1="6" x2="26" y2="13" stroke="#00E5CC" stroke-width="2" stroke-linecap="round"/>
      <line x1="26" y1="39" x2="26" y2="46" stroke="#00E5CC" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
      <line x1="6" y1="26" x2="13" y2="26" stroke="#00E5CC" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
      <line x1="39" y1="26" x2="46" y2="26" stroke="#00E5CC" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
    </svg>
  </div>

  <!-- Title -->
  <div class="title">MICRO<span>GOAL</span></div>
  <div class="tagline">30 · Day · Challenger</div>

  <!-- Feature pills -->
  <div class="features">
    <div class="feature-pill">
      <div class="pill-icon">⚡</div>
      <div class="pill-text">
        <strong>One Habit. Total Focus.</strong>
        <span>No distractions. Just your goal.</span>
      </div>
    </div>
    <div class="feature-pill">
      <div class="pill-icon">🔥</div>
      <div class="pill-text">
        <strong>7-Day Streak Rewards</strong>
        <span>Level up with RPG effects & sound.</span>
      </div>
    </div>
    <div class="feature-pill">
      <div class="pill-icon">🏆</div>
      <div class="pill-text">
        <strong>30-Day Challenge</strong>
        <span>Build a habit that actually sticks.</span>
      </div>
    </div>
  </div>

  <!-- CTA Button -->
  <button class="cta-btn" onclick="startApp()">BEGIN YOUR QUEST</button>
  <div class="sub-note">Your 30-day journey starts today</div>

</div>

<script>
  function startApp() {
    // This will communicate with Kodular
    window.AppInventor.setWebViewString("GO_TO_SETUP");
  }
</script>

</body>
</html>
