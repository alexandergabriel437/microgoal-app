<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>MicroGoal - Home</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: #0A0E1A;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    font-family: 'Rajdhani', sans-serif;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    position: relative;
  }

  .bg-grid {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background-image:
      linear-gradient(rgba(0,229,204,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,204,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    z-index: 0;
  }

  /* Header */
  .header {
    position: relative;
    z-index: 1;
    padding: 48px 24px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .header-left .greeting {
    font-size: 12px;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.35);
    text-transform: uppercase;
  }

  .header-left .goal-name {
    font-family: 'Orbitron', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: #FFFFFF;
    margin-top: 2px;
    max-width: 220px;
    white-space: nowrap;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    text-overflow: ellipsis;
  }

  .streak-badge {
    display: flex;
    flex-direction: column;
    align-items: center;
    background: rgba(0,229,204,0.08);
    border: 1px solid rgba(0,229,204,0.25);
    border-radius: 14px;
    padding: 10px 16px;
    gap: 2px;
  }

  .streak-badge .streak-num {
    font-family: 'Orbitron', sans-serif;
    font-size: 22px;
    font-weight: 900;
    color: #00E5CC;
    text-shadow: 0 0 12px rgba(0,229,204,0.6);
    line-height: 1;
  }

  .streak-badge .streak-label {
    font-size: 10px;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.4);
    text-transform: uppercase;
  }

  /* Main content */
  .content {
    position: relative;
    z-index: 1;
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 24px 100px;
    overflow-y: auto;
    gap: 20px;
  }

  /* Progress Ring */
  .ring-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    margin-top: 10px;
  }

  .ring-wrapper {
    position: relative;
    width: 220px;
    height: 220px;
  }

  .ring-wrapper svg {
    transform: rotate(-90deg);
    width: 220px;
    height: 220px;
  }

  .ring-bg {
    fill: none;
    stroke: rgba(255,255,255,0.05);
    stroke-width: 12;
  }

  .ring-progress {
    fill: none;
    stroke: url(#ringGradient);
    stroke-width: 12;
    stroke-linecap: round;
    stroke-dasharray: 628;
    stroke-dashoffset: 628;
    transition: stroke-dashoffset 1.2s cubic-bezier(0.4, 0, 0.2, 1);
    filter: drop-shadow(0 0 8px rgba(0,229,204,0.6));
  }

  .ring-center {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }

  .ring-value {
    font-family: 'Orbitron', sans-serif;
    font-size: 38px;
    font-weight: 900;
    color: #FFFFFF;
    line-height: 1;
    transition: all 0.3s ease;
  }

  .ring-label {
    font-size: 11px;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.4);
    text-transform: uppercase;
  }

  .ring-target {
    font-size: 12px;
    color: rgba(255,255,255,0.25);
    margin-top: 2px;
  }

  /* Status text */
  .status-text {
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
    text-align: center;
  }

  .status-text.complete {
    color: #00E5CC;
    text-shadow: 0 0 12px rgba(0,229,204,0.5);
  }

  /* Day progress bar */
  .day-card {
    width: 100%;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(0,229,204,0.1);
    border-radius: 18px;
    padding: 18px 20px;
  }

  .day-card-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }

  .day-card-label {
    font-size: 11px;
    letter-spacing: 3px;
    color: #00E5CC;
    text-transform: uppercase;
    opacity: 0.8;
  }

  .day-count {
    font-family: 'Orbitron', sans-serif;
    font-size: 13px;
    color: rgba(255,255,255,0.4);
  }

  /* Mini day dots */
  .day-dots {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
  }

  .day-dot {
    width: 18px;
    height: 18px;
    border-radius: 5px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    transition: all 0.3s ease;
  }

  .day-dot.done {
    background: rgba(0,229,204,0.25);
    border-color: #00E5CC;
    box-shadow: 0 0 6px rgba(0,229,204,0.3);
  }

  .day-dot.today {
    background: rgba(0,229,204,0.1);
    border-color: rgba(0,229,204,0.5);
    animation: todayPulse 2s infinite;
  }

  @keyframes todayPulse {
    0%, 100% { border-color: rgba(0,229,204,0.5); }
    50% { border-color: #00E5CC; box-shadow: 0 0 8px rgba(0,229,204,0.4); }
  }

  /* Log input section */
  .log-card {
    width: 100%;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(0,229,204,0.1);
    border-radius: 18px;
    padding: 18px 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .log-card-label {
    font-size: 11px;
    letter-spacing: 3px;
    color: #00E5CC;
    text-transform: uppercase;
    opacity: 0.8;
  }

  .log-input-row {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .log-input {
    flex: 1;
    background: rgba(0,229,204,0.05);
    border: 1.5px solid rgba(0,229,204,0.2);
    border-radius: 12px;
    padding: 14px 16px;
    color: #FFFFFF;
    font-family: 'Orbitron', sans-serif;
    font-size: 20px;
    font-weight: 700;
    text-align: center;
    outline: none;
    transition: border-color 0.3s ease, box-shadow 0.3s ease;
  }

  .log-input:focus {
    border-color: #00E5CC;
    box-shadow: 0 0 16px rgba(0,229,204,0.15);
  }

  .log-unit {
    font-size: 13px;
    color: rgba(255,255,255,0.35);
    letter-spacing: 1px;
    min-width: 50px;
  }

  /* Log Button */
  .log-btn {
    width: 100%;
    padding: 16px;
    border-radius: 14px;
    border: none;
    background: linear-gradient(135deg, #00E5CC, #00B4A0);
    color: #0A0E1A;
    font-family: 'Orbitron', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    cursor: pointer;
    position: relative;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    box-shadow: 0 0 24px rgba(0,229,204,0.35);
    transition: transform 0.15s ease;
  }

  .log-btn::before {
    content: '';
    position: absolute;
    top: -50%; left: -60%;
    width: 40%; height: 200%;
    background: rgba(255,255,255,0.25);
    transform: skewX(-20deg);
    animation: shimmer 3s infinite;
  }

  @keyframes shimmer {
    0% { left: -60%; }
    100% { left: 160%; }
  }

  .log-btn:active { transform: scale(0.97); }

  .log-btn.completed {
    background: rgba(0,229,204,0.1);
    border: 1.5px solid #00E5CC;
    color: #00E5CC;
    box-shadow: none;
  }

  /* Bottom Nav */
  .bottom-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 10;
    background: rgba(10,14,26,0.95);
    backdrop-filter: blur(20px);
    border-top: 1px solid rgba(0,229,204,0.1);
    display: flex;
    padding: 10px 0 20px;
  }

  .nav-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    padding: 6px 0;
    transition: all 0.2s ease;
  }

  .nav-icon {
    font-size: 20px;
    transition: transform 0.2s ease;
  }

  .nav-label {
    font-size: 10px;
    letter-spacing: 1px;
    color: rgba(255,255,255,0.3);
    text-transform: uppercase;
  }

  .nav-item.active .nav-label {
    color: #00E5CC;
  }

  .nav-item.active .nav-icon {
    filter: drop-shadow(0 0 6px rgba(0,229,204,0.8));
    transform: translateY(-2px);
  }

  /* Level Up Overlay */
  .levelup-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 100;
    background: rgba(0,0,0,0.85);
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
  }

  .levelup-overlay.show {
    display: flex;
    animation: overlayIn 0.4s ease forwards;
  }

  @keyframes overlayIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .levelup-ring {
    width: 160px;
    height: 160px;
    border-radius: 50%;
    border: 3px solid #00E5CC;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 64px;
    box-shadow: 0 0 40px rgba(0,229,204,0.6), inset 0 0 40px rgba(0,229,204,0.1);
    animation: levelupPulse 0.6s ease infinite alternate;
  }

  @keyframes levelupPulse {
    from { box-shadow: 0 0 40px rgba(0,229,204,0.6), inset 0 0 40px rgba(0,229,204,0.1); }
    to { box-shadow: 0 0 80px rgba(0,229,204,0.9), inset 0 0 60px rgba(0,229,204,0.2); }
  }

  .levelup-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 28px;
    font-weight: 900;
    color: #00E5CC;
    text-shadow: 0 0 30px rgba(0,229,204,0.8);
    letter-spacing: 3px;
    text-align: center;
  }

  .levelup-sub {
    font-size: 14px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 2px;
    text-align: center;
  }

  .levelup-btn {
    margin-top: 10px;
    padding: 14px 40px;
    border-radius: 12px;
    border: 1.5px solid #00E5CC;
    background: rgba(0,229,204,0.1);
    color: #00E5CC;
    font-family: 'Orbitron', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 2px;
    cursor: pointer;
  }

  /* Particles for level up */
  .particle {
    position: fixed;
    pointer-events: none;
    border-radius: 50%;
    animation: particleFly 1s ease-out forwards;
    z-index: 101;
  }

  @keyframes particleFly {
    0% { opacity: 1; transform: translate(0,0) scale(1); }
    100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .content > * {
    animation: fadeUp 0.5s ease forwards;
    opacity: 0;
  }

  .ring-section { animation-delay: 0.1s; }
  .day-card { animation-delay: 0.2s; }
  .log-card { animation-delay: 0.3s; }

</style>
</head>
<body>

<div class="bg-grid"></div>

<!-- Header -->
<div class="header">
  <div class="header-left">
    <div class="greeting">TODAY'S QUEST</div>
    <div class="goal-name" id="goalName">Daily Reading</div>
  </div>
  <div class="streak-badge">
    <span class="streak-num" id="streakNum">0</span>
    <span class="streak-label">⚡ Streak</span>
  </div>
</div>

<!-- Content -->
<div class="content">

  <!-- Progress Ring -->
  <div class="ring-section">
    <div class="ring-wrapper">
      <svg viewBox="0 0 220 220">
        <defs>
          <linearGradient id="ringGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#00E5CC"/>
            <stop offset="100%" style="stop-color:#00B4A0"/>
          </linearGradient>
        </defs>
        <circle class="ring-bg" cx="110" cy="110" r="100"/>
        <circle class="ring-progress" id="ringProgress" cx="110" cy="110" r="100"/>
      </svg>
      <div class="ring-center">
        <span class="ring-value" id="ringValue">0</span>
        <span class="ring-label" id="ringUnit">PAGES</span>
        <span class="ring-target" id="ringTarget">of 10 today</span>
      </div>
    </div>
    <div class="status-text" id="statusText">INCOMPLETE</div>
  </div>

  <!-- 30-Day Progress -->
  <div class="day-card">
    <div class="day-card-top">
      <span class="day-card-label">30-Day Progress</span>
      <span class="day-count" id="dayCount">Day 1/30</span>
    </div>
    <div class="day-dots" id="dayDots"></div>
  </div>

  <!-- Log Input -->
  <div class="log-card">
    <div class="log-card-label">Log Progress</div>
    <div class="log-input-row">
      <input
        class="log-input"
        id="logInput"
        type="number"
        placeholder="0"
        min="0"
      />
      <span class="log-unit" id="logUnit">Pages</span>
    </div>
    <button class="log-btn" id="logBtn" onclick="logProgress()">
      LOG PROGRESS
    </button>
  </div>

</div>

<!-- Bottom Nav -->
<div class="bottom-nav">
  <div class="nav-item active">
    <span class="nav-icon">🏠</span>
    <span class="nav-label">Home</span>
  </div>
  <div class="nav-item">
    <span class="nav-icon">📊</span>
    <span class="nav-label">Log</span>
  </div>
  <div class="nav-item">
    <span class="nav-icon">📅</span>
    <span class="nav-label">Calendar</span>
  </div>
  <div class="nav-item">
    <span class="nav-icon">👤</span>
    <span class="nav-label">Profile</span>
  </div>
</div>

<!-- Level Up Overlay -->
<div class="levelup-overlay" id="levelupOverlay">
  <div class="levelup-ring">⚡</div>
  <div class="levelup-title">LEVEL UP!</div>
  <div class="levelup-sub" id="levelupSub">7-DAY STREAK ACHIEVED</div>
  <button class="levelup-btn" onclick="closeLevelUp()">CONTINUE QUEST</button>
</div>

<script>
  // ── State ──
  let goalTitle = 'Daily Reading';
  let targetValue = 10;
  let targetUnit = 'Pages';
  let currentValue = 0;
  let streak = 0;
  let currentDay = 1;
  let completedDays = [];
  let todayLogged = false;

  // ── Init ──
  function init() {
    // Load data from Kodular via URL params or AppInventor
    try {
      const params = new URLSearchParams(window.location.search);
      if (params.get('goal')) goalTitle = decodeURIComponent(params.get('goal'));
      if (params.get('target')) targetValue = parseInt(params.get('target'));
      if (params.get('unit')) targetUnit = decodeURIComponent(params.get('unit'));
      if (params.get('streak')) streak = parseInt(params.get('streak'));
      if (params.get('day')) currentDay = parseInt(params.get('day'));
      if (params.get('logged')) currentValue = parseInt(params.get('logged'));
      if (params.get('days')) completedDays = JSON.parse(decodeURIComponent(params.get('days')));
      if (params.get('done')) todayLogged = params.get('done') === 'true';
    } catch(e) {}

    renderAll();
  }

  function renderAll() {
    // Header
    document.getElementById('goalName').textContent = goalTitle;
    document.getElementById('streakNum').textContent = streak;

    // Ring
    document.getElementById('ringUnit').textContent = targetUnit.toUpperCase();
    document.getElementById('ringTarget').textContent = 'of ' + targetValue + ' today';
    document.getElementById('logUnit').textContent = targetUnit;
    updateRing(currentValue);

    // Day dots
    renderDots();

    // Day count
    document.getElementById('dayCount').textContent = 'Day ' + currentDay + '/30';

    // If already completed today
    if (todayLogged && currentValue >= targetValue) {
      markComplete();
    }
  }

  function updateRing(value) {
    const clamped = Math.min(value, targetValue);
    const percent = clamped / targetValue;
    const circumference = 628;
    const offset = circumference - (percent * circumference);

    document.getElementById('ringProgress').style.strokeDashoffset = offset;
    document.getElementById('ringValue').textContent = value;

    if (value >= targetValue) {
      document.getElementById('ringProgress').style.stroke = '#00E5CC';
    }
  }

  function renderDots() {
    const container = document.getElementById('dayDots');
    container.innerHTML = '';
    for (let i = 1; i <= 30; i++) {
      const dot = document.createElement('div');
      dot.className = 'day-dot';
      if (completedDays.includes(i)) dot.classList.add('done');
      else if (i === currentDay) dot.classList.add('today');
      container.appendChild(dot);
    }
  }

  function logProgress() {
    if (todayLogged) return;

    const input = document.getElementById('logInput');
    const val = parseInt(input.value);

    if (!val || val <= 0) {
      input.style.borderColor = '#FF6B6B';
      setTimeout(() => input.style.borderColor = 'rgba(0,229,204,0.2)', 1000);
      return;
    }

    currentValue = val;
    updateRing(currentValue);

    if (currentValue >= targetValue) {
      markComplete();
      completedDays.push(currentDay);
      renderDots();

      // Check streak
      streak++;
      document.getElementById('streakNum').textContent = streak;

      // Save to Kodular
      const data = {
        action: 'LOG_DONE',
        value: currentValue,
        streak: streak,
        day: currentDay,
        completedDays: completedDays
      };
      try { window.AppInventor.setWebViewString(JSON.stringify(data)); } catch(e) {}

      // Level up check
      if (streak > 0 && streak % 7 === 0) {
        setTimeout(() => showLevelUp(streak), 800);
      }
    } else {
      // Partial log
      const data = {
        action: 'LOG_PARTIAL',
        value: currentValue
      };
      try { window.AppInventor.setWebViewString(JSON.stringify(data)); } catch(e) {}
    }
  }

  function markComplete() {
    todayLogged = true;
    document.getElementById('statusText').textContent = '✓ COMPLETE';
    document.getElementById('statusText').classList.add('complete');
    document.getElementById('logBtn').textContent = '✓ TODAY COMPLETE';
    document.getElementById('logBtn').classList.add('completed');
    document.getElementById('logBtn').disabled = true;
    document.getElementById('ringValue').style.color = '#00E5CC';
    document.getElementById('ringValue').style.textShadow = '0 0 20px rgba(0,229,204,0.8)';
  }

  function showLevelUp(streakCount) {
    const overlay = document.getElementById('levelupOverlay');
    document.getElementById('levelupSub').textContent = streakCount + '-DAY STREAK ACHIEVED!';
    overlay.classList.add('show');
    spawnParticles();
    // Tell Kodular to play sound
    try { window.AppInventor.setWebViewString('PLAY_LEVELUP_SOUND'); } catch(e) {}
  }

  function closeLevelUp() {
    document.getElementById('levelupOverlay').classList.remove('show');
  }

  function spawnParticles() {
    const colors = ['#00E5CC', '#FFFFFF', '#00B4A0', '#7FFFD4'];
    for (let i = 0; i < 30; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = Math.random() * 8 + 4;
      const tx = (Math.random() - 0.5) * window.innerWidth * 1.5;
      const ty = (Math.random() - 0.5) * window.innerHeight * 1.5;
      p.style.cssText = `
        width: ${size}px;
        height: ${size}px;
        background: ${colors[Math.floor(Math.random()*colors.length)]};
        left: ${window.innerWidth/2}px;
        top: ${window.innerHeight/2}px;
        --tx: ${tx}px;
        --ty: ${ty}px;
        animation-delay: ${Math.random()*0.3}s;
        animation-duration: ${0.8 + Math.random()*0.6}s;
      `;
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 1500);
    }
  }

  // ── Start ──
  window.onload = init;
</script>

</body>
</html>
