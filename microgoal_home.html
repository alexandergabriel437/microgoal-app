<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>MicroGoal - Home</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: #0A0E1A;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    font-family: 'Rajdhani', sans-serif;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  .bg-grid {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background-image:
      linear-gradient(rgba(0,229,204,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,204,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    z-index: 0;
    pointer-events: none;
  }

  /* Header */
  .header {
    position: relative;
    z-index: 1;
    padding: 48px 24px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .header-left .greeting {
    font-size: 11px;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.75);
    text-transform: uppercase;
    font-family: 'Rajdhani', sans-serif;
  }

  .header-left .goal-name {
    font-family: 'Orbitron', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: #FFFFFF;
    margin-top: 4px;
    max-width: 200px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .streak-badge {
    display: flex;
    flex-direction: column;
    align-items: center;
    background: rgba(0,229,204,0.08);
    border: 1.5px solid rgba(0,229,204,0.25);
    border-radius: 14px;
    padding: 10px 18px;
    gap: 2px;
    min-width: 80px;
  }

  .streak-num {
    font-family: 'Orbitron', sans-serif;
    font-size: 24px;
    font-weight: 900;
    color: #00E5CC;
    text-shadow: 0 0 12px rgba(0,229,204,0.6);
    line-height: 1;
  }

  .streak-label {
    font-size: 10px;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.80);
    text-transform: uppercase;
    font-family: 'Rajdhani', sans-serif;
  }

  /* Main content */
  .content {
    position: relative;
    z-index: 1;
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 24px 120px;
    gap: 20px;
  }

  /* Progress Ring */
  .ring-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    width: 100%;
    margin-top: 8px;
  }

  .ring-wrapper {
    position: relative;
    width: 210px;
    height: 210px;
  }

  .ring-svg {
    transform: rotate(-90deg);
    width: 210px;
    height: 210px;
  }

  .ring-bg {
    fill: none;
    stroke: rgba(255,255,255,0.08);
    stroke-width: 14;
  }

  .ring-progress {
    fill: none;
    stroke: #00E5CC;
    stroke-width: 14;
    stroke-linecap: round;
    stroke-dasharray: 597;
    stroke-dashoffset: 597;
    transition: stroke-dashoffset 1s ease;
    filter: drop-shadow(0 0 8px rgba(0,229,204,0.7));
  }

  .ring-center {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
  }

  .ring-value {
    font-family: 'Orbitron', sans-serif;
    font-size: 44px;
    font-weight: 900;
    color: #FFFFFF;
    line-height: 1;
  }

  .ring-unit-label {
    font-family: 'Rajdhani', sans-serif;
    font-size: 12px;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.80);
    text-transform: uppercase;
  }

  .ring-target-label {
    font-family: 'Rajdhani', sans-serif;
    font-size: 12px;
    color: rgba(255,255,255,0.65);
  }

  .status-text {
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.75);
  }

  .status-text.complete {
    color: #00E5CC;
    text-shadow: 0 0 12px rgba(0,229,204,0.5);
  }

  /* Cards */
  .card {
    width: 100%;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(0,229,204,0.1);
    border-radius: 18px;
    padding: 18px 20px;
  }

  .card-label {
    font-family: 'Rajdhani', sans-serif;
    font-size: 11px;
    letter-spacing: 3px;
    color: #00E5CC;
    text-transform: uppercase;
    margin-bottom: 14px;
    opacity: 0.8;
  }

  .day-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }

  .day-count {
    font-family: 'Orbitron', sans-serif;
    font-size: 12px;
    color: rgba(255,255,255,0.75);
  }

  .day-dots {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
  }

  .day-dot {
    width: 16px;
    height: 16px;
    border-radius: 4px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
  }

  .day-dot.done {
    background: rgba(0,229,204,0.3);
    border-color: #00E5CC;
    box-shadow: 0 0 5px rgba(0,229,204,0.3);
  }

  .day-dot.today {
    background: rgba(0,229,204,0.08);
    border-color: rgba(0,229,204,0.6);
    animation: todayPulse 2s infinite;
  }

  @keyframes todayPulse {
    0%,100% { border-color: rgba(0,229,204,0.4); }
    50% { border-color: #00E5CC; }
  }

  /* Log input */
  .log-row {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
  }

  .log-input {
    flex: 1;
    background: rgba(0,229,204,0.05);
    border: 1.5px solid rgba(0,229,204,0.2);
    border-radius: 12px;
    padding: 14px;
    color: #FFFFFF;
    font-family: 'Orbitron', sans-serif;
    font-size: 22px;
    font-weight: 700;
    text-align: center;
    outline: none;
    -webkit-appearance: none;
  }

  .log-input:focus {
    border-color: #00E5CC;
    box-shadow: 0 0 14px rgba(0,229,204,0.15);
  }

  .log-unit-text {
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    color: rgba(255,255,255,0.75);
    letter-spacing: 1px;
    min-width: 55px;
  }

  .log-btn {
    width: 100%;
    padding: 16px;
    border-radius: 14px;
    border: none;
    background: linear-gradient(135deg, #00E5CC, #00B4A0);
    color: #0A0E1A;
    font-family: 'Orbitron', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    cursor: pointer;
    box-shadow: 0 0 24px rgba(0,229,204,0.3);
    transition: transform 0.15s ease;
    position: relative;
    overflow: hidden;
  }

  .log-btn::before {
    content: '';
    position: absolute;
    top: -50%; left: -60%;
    width: 40%; height: 200%;
    background: rgba(255,255,255,0.2);
    transform: skewX(-20deg);
    animation: shimmer 3s infinite;
  }

  @keyframes shimmer {
    0% { left: -60%; }
    100% { left: 160%; }
  }

  .log-btn:active { transform: scale(0.97); }

  .log-btn.done-btn {
    background: rgba(0,229,204,0.08);
    border: 1.5px solid #00E5CC;
    color: #00E5CC;
    box-shadow: none;
  }

  /* Bottom Nav */
  .bottom-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 10;
    background: rgba(10,14,26,0.97);
    border-top: 1px solid rgba(0,229,204,0.1);
    display: flex;
    padding: 10px 0 24px;
  }

  .nav-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    padding: 4px 0;
  }

  .nav-icon { font-size: 20px; }

  .nav-label {
    font-family: 'Rajdhani', sans-serif;
    font-size: 10px;
    letter-spacing: 1px;
    color: rgba(255,255,255,0.75);
    text-transform: uppercase;
  }

  .nav-item.active .nav-label { color: #00E5CC; }
  .nav-item.active .nav-icon { filter: drop-shadow(0 0 5px rgba(0,229,204,0.8)); }

  /* Level Up */
  .levelup-overlay {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: rgba(0,0,0,0.88);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
  }

  .levelup-overlay.show { display: flex; }

  .levelup-ring {
    width: 150px;
    height: 150px;
    border-radius: 50%;
    border: 3px solid #00E5CC;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 60px;
    box-shadow: 0 0 50px rgba(0,229,204,0.6);
    animation: lvlPulse 0.8s ease infinite alternate;
  }

  @keyframes lvlPulse {
    from { box-shadow: 0 0 30px rgba(0,229,204,0.5); }
    to { box-shadow: 0 0 70px rgba(0,229,204,0.9); }
  }

  .levelup-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 30px;
    font-weight: 900;
    color: #00E5CC;
    text-shadow: 0 0 30px rgba(0,229,204,0.8);
    letter-spacing: 3px;
  }

  .levelup-sub {
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    color: rgba(255,255,255,0.85);
    letter-spacing: 2px;
  }

  .levelup-close {
    padding: 14px 36px;
    border-radius: 12px;
    border: 1.5px solid #00E5CC;
    background: rgba(0,229,204,0.1);
    color: #00E5CC;
    font-family: 'Orbitron', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 2px;
    cursor: pointer;
    margin-top: 8px;
  }

  .particle {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    animation: pFly 1.2s ease-out forwards;
    z-index: 101;
  }

  @keyframes pFly {
    0% { opacity: 1; transform: translate(0,0) scale(1); }
    100% { opacity: 0; transform: translate(var(--tx),var(--ty)) scale(0); }
  }
</style>
</head>
<body>

<div class="bg-grid"></div>

<div class="header">
  <div class="header-left">
    <div class="greeting">TODAY'S QUEST</div>
    <div class="goal-name" id="goalName">My Goal</div>
  </div>
  <div class="streak-badge">
    <span class="streak-num" id="streakNum">0</span>
    <span class="streak-label">⚡ Streak</span>
  </div>
</div>

<div class="content">

  <div class="ring-section">
    <div class="ring-wrapper">
      <svg class="ring-svg" viewBox="0 0 210 210">
        <circle class="ring-bg" cx="105" cy="105" r="95"/>
        <circle class="ring-progress" id="ringProgress" cx="105" cy="105" r="95"/>
      </svg>
      <div class="ring-center">
        <span class="ring-value" id="ringValue">0</span>
        <span class="ring-unit-label" id="ringUnitLabel">UNIT</span>
        <span class="ring-target-label" id="ringTargetLabel">of 10 today</span>
      </div>
    </div>
    <div class="status-text" id="statusText">INCOMPLETE</div>
  </div>

  <div class="card">
    <div class="day-header">
      <span class="card-label" style="margin-bottom:0">30-Day Progress</span>
      <span class="day-count" id="dayCount">Day 1/30</span>
    </div>
    <div class="day-dots" id="dayDots"></div>
  </div>

  <div class="card">
    <div class="card-label">Log Progress</div>
    <div style="display:flex;align-items:center;background:rgba(0,229,204,0.05);border:1.5px solid rgba(0,229,204,0.2);border-radius:12px;overflow:hidden;width:100%;margin-bottom:14px;">
      <input id="logInput" type="number" placeholder="0" min="0" style="flex:1;background:transparent;border:none;padding:14px 10px;color:#FFFFFF;font-family:'Orbitron',sans-serif;font-size:22px;font-weight:700;text-align:center;outline:none;width:0;min-width:0;-webkit-appearance:none;"/>
      <div style="width:1px;height:30px;background:rgba(0,229,204,0.2);flex-shrink:0;"></div>
      <span id="logUnitText" style="font-family:'Rajdhani',sans-serif;font-size:13px;color:rgba(255,255,255,0.85);letter-spacing:1px;padding:0 14px;flex-shrink:0;white-space:nowrap;">Unit</span>
    </div>
    <button class="log-btn" id="logBtn" onclick="logProgress()">LOG PROGRESS</button>
  </div>

</div>

<div class="bottom-nav">
  <div class="nav-item active">
    <span class="nav-icon">🏠</span>
    <span class="nav-label">Home</span>
  </div>
  <div class="nav-item">
    <span class="nav-icon">📊</span>
    <span class="nav-label">Log</span>
  </div>
  <div class="nav-item">
    <span class="nav-icon">📅</span>
    <span class="nav-label">Calendar</span>
  </div>
  <div class="nav-item">
    <span class="nav-icon">👤</span>
    <span class="nav-label">Profile</span>
  </div>
</div>

<div class="levelup-overlay" id="levelupOverlay">
  <div class="levelup-ring">⚡</div>
  <div class="levelup-title">LEVEL UP!</div>
  <div class="levelup-sub" id="levelupSub">7-DAY STREAK!</div>
  <button class="levelup-close" onclick="closeLevelUp()">CONTINUE QUEST</button>
</div>

<script>
  var goalTitle = 'My Goal';
  var targetValue = 10;
  var targetUnit = 'Pages';
  var currentValue = 0;
  var streak = 0;
  var currentDay = 1;
  var completedDays = [];
  var todayDone = false;

  function init() {
    try {
      // Read data from URL — format: ?goal=X&target=Y&unit=Z
      var url = window.location.href;
      
      function getParam(key) {
        var match = url.match(new RegExp('[?&]' + key + '=([^&]*)'));
        return match ? decodeURIComponent(match[1].replace(/\+/g, ' ')) : null;
      }

      var g = getParam('goal');
      var t = getParam('target');
      var u = getParam('unit');
      var s = getParam('streak');
      var d = getParam('day');

      if (g && g !== 'null') goalTitle = g;
      if (t && t !== 'null') targetValue = parseInt(t);
      if (u && u !== 'null') targetUnit = u;
      if (s && s !== 'null') streak = parseInt(s);
      if (d && d !== 'null') currentDay = parseInt(d);

    } catch(e) {}

    renderAll();
  }

  function renderAll() {
    document.getElementById('goalName').textContent = goalTitle;
    document.getElementById('streakNum').textContent = streak;
    document.getElementById('ringUnitLabel').textContent = targetUnit.toUpperCase();
    document.getElementById('ringTargetLabel').textContent = 'of ' + targetValue + ' today';
    document.getElementById('logUnitText').textContent = targetUnit;
    document.getElementById('dayCount').textContent = 'Day ' + currentDay + '/30';

    updateRing(currentValue);
    renderDots();

    if (todayDone) markComplete();
  }

  function updateRing(val) {
    var clamped = Math.min(val, targetValue);
    var pct = targetValue > 0 ? clamped / targetValue : 0;
    var circ = 2 * Math.PI * 95;
    var offset = circ - (pct * circ);
    document.getElementById('ringProgress').style.strokeDasharray = circ;
    document.getElementById('ringProgress').style.strokeDashoffset = offset;
    document.getElementById('ringValue').textContent = val;
  }

  function renderDots() {
    var container = document.getElementById('dayDots');
    container.innerHTML = '';
    for (var i = 1; i <= 30; i++) {
      var dot = document.createElement('div');
      dot.className = 'day-dot';
      if (completedDays.indexOf(i) > -1) dot.classList.add('done');
      else if (i === currentDay) dot.classList.add('today');
      container.appendChild(dot);
    }
  }

  function logProgress() {
    if (todayDone) return;
    var val = parseInt(document.getElementById('logInput').value);
    if (!val || val <= 0) {
      document.getElementById('logInput').style.borderColor = '#FF6B6B';
      setTimeout(function(){ document.getElementById('logInput').style.borderColor = 'rgba(0,229,204,0.2)'; }, 1000);
      return;
    }

    currentValue = val;
    updateRing(currentValue);

    if (currentValue >= targetValue) {
      completedDays.push(currentDay);
      renderDots();
      streak++;
      document.getElementById('streakNum').textContent = streak;
      markComplete();

      var data = {
        action: 'LOG_DONE',
        value: currentValue,
        streak: streak,
        day: currentDay,
        completedDays: completedDays
      };
      try { window.AppInventor.setWebViewString(JSON.stringify(data)); } catch(e) {}

      if (streak % 7 === 0) {
        setTimeout(function(){ showLevelUp(streak); }, 800);
      }
    } else {
      try { window.AppInventor.setWebViewString(JSON.stringify({action:'LOG_PARTIAL',value:currentValue})); } catch(e) {}
    }
  }

  function markComplete() {
    todayDone = true;
    document.getElementById('statusText').textContent = '✓ COMPLETE';
    document.getElementById('statusText').classList.add('complete');
    document.getElementById('ringValue').style.color = '#00E5CC';
    document.getElementById('ringValue').style.textShadow = '0 0 20px rgba(0,229,204,0.8)';
    var btn = document.getElementById('logBtn');
    btn.textContent = '✓ TODAY COMPLETE';
    btn.classList.add('done-btn');
    btn.disabled = true;
  }

  function showLevelUp(s) {
    document.getElementById('levelupSub').textContent = s + '-DAY STREAK ACHIEVED!';
    document.getElementById('levelupOverlay').classList.add('show');
    spawnParticles();
    try { window.AppInventor.setWebViewString('PLAY_LEVELUP_SOUND'); } catch(e) {}
  }

  function closeLevelUp() {
    document.getElementById('levelupOverlay').classList.remove('show');
  }

  function spawnParticles() {
    var colors = ['#00E5CC','#FFFFFF','#00B4A0'];
    for (var i = 0; i < 25; i++) {
      var p = document.createElement('div');
      p.className = 'particle';
      var size = Math.random() * 8 + 4;
      var tx = (Math.random() - 0.5) * window.innerWidth * 1.4;
      var ty = (Math.random() - 0.5) * window.innerHeight * 1.4;
      p.style.cssText = 'width:'+size+'px;height:'+size+'px;background:'+colors[Math.floor(Math.random()*3)]+';left:'+window.innerWidth/2+'px;top:'+window.innerHeight/2+'px;--tx:'+tx+'px;--ty:'+ty+'px;animation-delay:'+Math.random()*0.3+'s;';
      document.body.appendChild(p);
      setTimeout(function(){ if(p.parentNode) p.parentNode.removeChild(p); }, 1500);
    }
  }

  window.onload = init;
</script>
</body>
</html>
